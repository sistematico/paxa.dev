---
- name: Deploy paxa systemd unit and nginx site configs
  hosts: web
  become: true

  vars:
    nginx_conf_dir: /etc/nginx/sites.d

  tasks:
    - name: Ensure required packages are installed
      package:
        name: nginx
        state: present
      tags: [nginx]

    - name: (optional) Ensure Node.js 20.x is installed (prevents CI/runtime engine errors)
      when: install_node is defined and install_node | bool
      block:
        - name: Add NodeSource APT repo (Debian/Ubuntu)
          apt_key:
            url: https://deb.nodesource.com/gpgkey/nodesource.gpg.key
            state: present
          when: ansible_os_family == 'Debian'

        - name: Add NodeSource repository
          apt_repository:
            repo: 'deb https://deb.nodesource.com/node_20.x {{ ansible_lsb.codename }} main'
            state: present
          when: ansible_os_family == 'Debian'

        - name: Install nodejs
          package:
            name: nodejs
            state: present
      tags: [runtime]

    - name: (optional) Ensure Bun is installed for deploy user
      when: install_bun is defined and install_bun | bool
      become: true
      become_user: "{{ deploy_user | default('nginx') }}"
      environment:
        HOME: "/home/{{ deploy_user | default('nginx') }}"
      shell: |
        set -euo pipefail
        [ -d "$HOME/.bun" ] || curl -fsSL https://bun.sh/install | bash
      tags: [runtime]

    - name: Ensure nginx config directory exists
      file:
        path: "{{ nginx_conf_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      tags: [nginx]

    - name: Deploy nginx site configuration files
      copy:
        src: "{{ playbook_dir }}/files/etc/nginx/sites.d/"
        dest: "{{ nginx_conf_dir }}/"
        owner: root
        group: root
        mode: '0644'
        directory_mode: '0755'
        recurse: yes
      tags: [nginx]

    - name: Test nginx configuration
      command: nginx -t
      register: nginx_test
      changed_when: false
      failed_when: nginx_test.rc != 0
      tags: [nginx]

    - name: Reload nginx if config is OK
      service:
        name: nginx
        state: reloaded
      when: nginx_test.rc == 0
      tags: [nginx]

    - name: Deploy systemd unit file
      copy:
        src: "{{ playbook_dir }}/files/etc/systemd/system/paxa.service"
        dest: /etc/systemd/system/paxa.service
        owner: root
        group: root
        mode: '0644'
      notify: Reload systemd
      tags: [systemd]

    - name: Ensure paxa.service is enabled and started
      systemd:
        name: paxa.service
        enabled: yes
        state: restarted
      tags: [systemd]

  handlers:
    - name: Reload systemd
      systemd:
        daemon_reload: yes
