---
- name: Deploy paxa systemd unit and nginx site configs
  hosts: web
  become: true

  vars:
    nginx_conf_dir: /etc/nginx/sites.d

  tasks:
    - name: Ensure required packages are installed
      package:
        name: nginx
        state: present
      tags: [nginx]

    - name: Ensure nginx config directory exists
      file:
        path: "{{ nginx_conf_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      tags: [nginx]

    - name: Deploy nginx site configuration files
      copy:
        src: "{{ playbook_dir }}/files/etc/nginx/sites.d/"
        dest: "{{ nginx_conf_dir }}/"
        owner: root
        group: root
        mode: '0644'
        directory_mode: '0755'
        recurse: yes
      tags: [nginx]

    - name: Test nginx configuration
      command: nginx -t
      register: nginx_test
      changed_when: false
      failed_when: nginx_test.rc != 0
      tags: [nginx]

    - name: Reload nginx if config is OK
      service:
        name: nginx
        state: reloaded
      when: nginx_test.rc == 0
      tags: [nginx]

    - name: Deploy systemd unit file
      copy:
        src: "{{ playbook_dir }}/files/etc/systemd/system/paxa.service"
        dest: /etc/systemd/system/paxa.service
        owner: root
        group: root
        mode: '0644'
      notify: Reload systemd
      tags: [systemd]

    - name: Ensure paxa.service is enabled and started
      systemd:
        name: paxa.service
        enabled: yes
        state: restarted
      tags: [systemd]

  handlers:
    - name: Reload systemd
      systemd:
        daemon_reload: yes
