# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name paxa.dev www.paxa.dev en.paxa.dev;
    return 301 https://$host$request_uri;
}

# www → apex redirect
server {
    listen 443 ssl;
    listen [::]:443 ssl;

    ssl_certificate         /etc/letsencrypt/live/paxa.dev/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/paxa.dev/privkey.pem;

    server_name www.paxa.dev;
    return 301 https://paxa.dev$request_uri;
}

# Main application server (paxa.dev + en.paxa.dev)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    ssl_certificate         /etc/letsencrypt/live/paxa.dev/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/paxa.dev/privkey.pem;

    server_name paxa.dev en.paxa.dev;
    #include conf.d/px-errors.conf;

    # Redirect /pt/* to paxa.dev/* (strip locale prefix)
    location ~ ^/pt(/.*)?$ {
        return 301 https://paxa.dev$1;
    }

    # Redirect /en/* to en.paxa.dev/* (strip locale prefix)
    location ~ ^/en(/.*)?$ {
        return 301 https://en.paxa.dev$1;
    }

    # Static files from public/ — served directly by Nginx (vinext only serves /assets/)
    location ~* ^/(images|audio)/ {
        root /var/www/paxa.dev/dist/client;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}